<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Updates - Aceey</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="./favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-left">
                <a href="./index.html" class="navbar-logo">
                    <img src="./favicon.png" alt="Aceey Logo" width="24" height="24">
                    <span>Aceey</span>
                </a>
            </div>
            <ul class="navbar-middle">
                <li><a href="./index.html#features">Features</a></li>
                <li><a href="./updates.html">Updates</a></li>
                <li><a href="./index.html#faq">FAQ</a></li>
            </ul>
            <div class="navbar-right">
                <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme">
                    <!-- Icon will be injected by JS -->
                </button>
                <a href="https://github.com/rayhuang2006/Aceey" target="_blank" class="github-link">
                    <svg viewBox="0 0 16 16" width="24" height="24" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
                </a>
                <a href="./index.html#hero" class="btn btn-navbar">Download</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div id="changelog-container" class="changelog-content animate-on-scroll">
            <p style="text-align: center; padding: 4rem 0; color: var(--text-muted);">正在載入更新日誌...</p>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Aceey. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // 1. Theme Toggle Logic
        const themeToggle = document.getElementById('theme-toggle');
        const sunIcon = `
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>`;
        const moonIcon = `
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>`;

        function setTheme(theme) {
            if (theme === 'light') {
                document.body.classList.add('light-mode');
                themeToggle.innerHTML = moonIcon;
            } else {
                document.body.classList.remove('light-mode');
                themeToggle.innerHTML = sunIcon;
            }
            localStorage.setItem('theme', theme);
        }

        themeToggle.addEventListener('click', () => {
            const isLight = document.body.classList.contains('light-mode');
            setTheme(isLight ? 'dark' : 'light');
        });

        // 2. Fetch and Render Changelog
        async function fetchChangelog() {
            const container = document.getElementById('changelog-container');
            try {
                const response = await fetch('https://raw.githubusercontent.com/rayhuang2006/Aceey/main/CHANGELOG.md');
                if (!response.ok) throw new Error('Network response was not ok');
                const markdownText = await response.text();
                container.innerHTML = marked.parse(markdownText);
                container.classList.add('is-visible');
            } catch (error) {
                console.error('Failed to fetch changelog:', error);
                container.innerHTML = `
                    <div class="error-msg">
                        <h3>無法載入更新日誌</h3>
                        <p>請至 <a href="https://github.com/rayhuang2006/Aceey/releases" target="_blank">GitHub Releases</a> 查看最新版本動態。</p>
                    </div>
                `;
            }
        }

        // Init
        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            setTheme(savedTheme);
            fetchChangelog();
        });
    </script>
</body>
</html>
